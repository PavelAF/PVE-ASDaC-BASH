# Автопроверка: ГИА ДЭ 09.02.06-1-2026, Модуль 1 — Настройка сетевой инфраструктуры
# Все ВМ — AltLinux, подключение через QEMU Guest Agent

autocheck_name='ДЭ 09.02.06-1-2026 Модуль 1: Сетевая инфраструктура'

autocheck_vms='
    ISP    = exec_agent
    HQ-RTR = exec_agent
    BR-RTR = exec_agent
    HQ-SRV = exec_agent
    BR-SRV = exec_agent
    HQ-CLI = exec_agent
'

# ====== Задание 1: Имена устройств (FQDN) ======
check_1_name='Имя хоста (hostname)'
check_1_vms='ISP HQ-RTR BR-RTR HQ-SRV BR-SRV HQ-CLI'
check_1_cmd_exec_agent='hostname -f 2>/dev/null; hostname'

# ====== Задание 1: IP-адресация ======
check_2_name='IP-адреса интерфейсов'
check_2_vms='ISP HQ-RTR BR-RTR HQ-SRV BR-SRV HQ-CLI'
check_2_cmd_exec_agent='ip -br a'

check_3_name='Таблица маршрутизации'
check_3_vms='ISP HQ-RTR BR-RTR HQ-SRV BR-SRV HQ-CLI'
check_3_cmd_exec_agent='ip route'

# ====== Задание 2: ISP — NAT и маршрутизация ======
check_4_name='ISP: правила NAT (iptables)'
check_4_vms='ISP'
check_4_cmd_exec_agent='iptables -t nat -L -nv 2>/dev/null || nft list ruleset 2>/dev/null | head -40'

# ====== Задание 3: Учетные записи ======
check_5_name='Пользователь sshuser (uid=2026)'
check_5_vms='HQ-SRV BR-SRV'
check_5_cmd_exec_agent='id sshuser 2>&1'

check_6_name='Пользователь net_admin'
check_6_vms='HQ-RTR BR-RTR'
check_6_cmd_exec_agent='id net_admin 2>&1'

check_7_name='Sudo без пароля'
check_7_vms='HQ-SRV BR-SRV HQ-RTR BR-RTR'
check_7_cmd_exec_agent='grep -rhPv "^\s*#|^\s*$" /etc/sudoers /etc/sudoers.d/ 2>/dev/null | grep -iP "sshuser|net_admin|NOPASSWD"'

# ====== Задание 4: VLAN (HQ-RTR) ======
check_8_name='VLAN интерфейсы (100, 200, 999)'
check_8_vms='HQ-RTR'
check_8_cmd_exec_agent='ip -d link show | grep -A1 "vlan\|802.1Q" 2>/dev/null; echo "---"; ip -br a | grep -iP "vlan|\.100|\.200|\.999"'

# ====== Задание 5: SSH ======
check_9_name='Конфигурация SSH (порт, пользователь, попытки, баннер)'
check_9_vms='HQ-SRV BR-SRV'
check_9_cmd_exec_agent='for f in /etc/openssh/sshd_config /etc/ssh/sshd_config; do [ -f "$f" ] && grep -Pv "^\s*#|^\s*$" "$f" | grep -iP "Port|AllowUsers|MaxAuth|Banner" && break; done'

# ====== Задание 6: Туннель GRE/IPIP ======
check_10_name='Туннель (GRE/IPIP)'
check_10_vms='HQ-RTR BR-RTR'
check_10_cmd_exec_agent='ip tunnel show 2>/dev/null; echo "---"; ip -br a | grep -iP "gre|tun|ipip"'

# ====== Задание 7: Динамическая маршрутизация (OSPF и т.д.) ======
check_11_name='FRR/OSPF: статус соседей и маршруты'
check_11_vms='HQ-RTR BR-RTR'
check_11_cmd_exec_agent='vtysh -c "show ip ospf neighbor" 2>/dev/null; vtysh -c "show ip route ospf" 2>/dev/null || echo "(FRR/vtysh не найден)"'

# ====== Задание 8: NAT на маршрутизаторах ======
check_12_name='NAT на маршрутизаторах'
check_12_vms='HQ-RTR BR-RTR'
check_12_cmd_exec_agent='iptables -t nat -L POSTROUTING -nv 2>/dev/null || nft list ruleset 2>/dev/null | grep -A5 "postrouting"'

# ====== Задание 9: DHCP ======
check_13_name='DHCP-сервер (конфигурация)'
check_13_vms='HQ-RTR'
check_13_cmd_exec_agent='cat /etc/dhcp/dhcpd.conf 2>/dev/null || cat /etc/dnsmasq.conf 2>/dev/null | grep -Pv "^\s*#|^\s*$" || echo "(конфиг DHCP не найден)"'

check_14_name='DHCP-клиент: полученный адрес и DNS-суффикс'
check_14_vms='HQ-CLI'
check_14_cmd_exec_agent='ip -br a; echo "---"; cat /etc/resolv.conf'

# ====== Задание 10: DNS ======
check_15_name='DNS-сервер: конфигурация зон'
check_15_vms='HQ-SRV'
check_15_cmd_exec_agent='cat /etc/bind/named.conf.local 2>/dev/null; echo "==="; ls /etc/bind/zones/ 2>/dev/null; ls /var/named/ 2>/dev/null'

check_16_name='DNS: прямое разрешение (au-team.irpo)'
check_16_vms='HQ-SRV'
check_16_cmd_exec_agent='for h in hq-rtr br-rtr hq-srv hq-cli br-srv; do echo -n "$h.au-team.irpo -> "; dig +short $h.au-team.irpo @127.0.0.1 2>/dev/null || host $h.au-team.irpo 127.0.0.1 2>/dev/null; done'

check_17_name='DNS: обратное разрешение (PTR)'
check_17_vms='HQ-SRV'
check_17_cmd_exec_agent='echo "Зоны обратного разрешения:"; ls /etc/bind/zones/*rev* /var/named/*rev* /var/named/*arpa* 2>/dev/null; echo "---"; grep -rl "PTR" /etc/bind/zones/ /var/named/ 2>/dev/null | head -5'

check_18_name='DNS: специальные записи (docker, web)'
check_18_vms='HQ-SRV'
check_18_cmd_exec_agent='for h in docker.au-team.irpo web.au-team.irpo; do echo -n "$h -> "; dig +short $h @127.0.0.1 2>/dev/null || host $h 127.0.0.1 2>/dev/null; done'

# ====== Задание 11: Часовой пояс ======
check_19_name='Часовой пояс'
check_19_vms='ISP HQ-RTR BR-RTR HQ-SRV BR-SRV HQ-CLI'
check_19_cmd_exec_agent='timedatectl 2>/dev/null | grep "Time zone" || date +%Z'

# ====== Доп. проверки связности ======
check_20_name='Связность: ping шлюза по умолчанию'
check_20_vms='HQ-RTR BR-RTR HQ-SRV BR-SRV HQ-CLI'
check_20_cmd_exec_agent='gw=$(ip route | awk "/default/{print \$3}"); echo "gateway: $gw"; ping -c2 -W2 $gw 2>&1 | tail -1'

check_21_name='Связность: ping между офисами через туннель'
check_21_vms='HQ-SRV BR-SRV'
check_21_cmd_exec_agent='echo "ping шлюз:"; ping -c2 -W2 $(ip route | grep default | awk "{print \$3}") 2>&1 | tail -1'

check_22_name='Доступ в Интернет'
check_22_vms='HQ-SRV BR-SRV HQ-CLI'
check_22_cmd_exec_agent='ping -c2 -W3 77.88.8.8 2>&1 | tail -1'
