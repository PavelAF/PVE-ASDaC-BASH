# Пример конфигурации автопроверки стенда
# Скопируйте этот файл и отредактируйте под свой стенд

autocheck_name='Пример автопроверки'

# Список ВМ и способ подключения:
#   exec_agent  — через QEMU Guest Agent (требуется qemu-guest-agent внутри ВМ)
#   exec_serial — через serial console (socat + /var/run/qemu-server/{VMID}.serial0)
autocheck_vms='
    ISP    = exec_agent
    HQ-RTR = exec_serial
    HQ-SRV = exec_agent
    HQ-CLI = exec_agent
    BR-RTR = exec_serial
    BR-SRV = exec_agent
'

# Настройки serial console (для всех exec_serial ВМ по умолчанию)
exec_serial_prompt='[A-Za-z0-9._-]+[#>]'
exec_serial_timeout='3'
exec_serial_login='admin'
exec_serial_password='P@ssw0rd'

# Переопределение логина/пароля для конкретной ВМ (приоритетнее).
# Имя переменной: <имя_ВМ>_serial_login, дефисы заменяются на подчеркивания
# BR_RTR_serial_login='root'
# BR_RTR_serial_password='toor'

# ============ Проверки ============
# Формат:
#   check_N_name              — название проверки
#   check_N_vms               — список ВМ (через пробел)
#   check_N_cmd_exec_agent    — команда для ВМ с exec_agent
#   check_N_cmd_exec_serial   — команда для ВМ с exec_serial

check_1_name='IP-адреса'
check_1_vms='ISP HQ-RTR HQ-SRV BR-RTR BR-SRV'
check_1_cmd_exec_agent='ip -br a'
check_1_cmd_exec_serial='show ip interfaces brief'

check_2_name='Таблица маршрутизации'
check_2_vms='HQ-RTR BR-RTR ISP'
check_2_cmd_exec_agent='ip route'
check_2_cmd_exec_serial='show ip route'

check_3_name='DNS'
check_3_vms='HQ-SRV BR-SRV'
check_3_cmd_exec_agent='cat /etc/resolv.conf'

check_4_name='Имя хоста'
check_4_vms='HQ-SRV HQ-CLI BR-SRV'
check_4_cmd_exec_agent='hostname'
